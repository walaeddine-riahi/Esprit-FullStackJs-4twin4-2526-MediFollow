# ============================================
# MediFollow Admin - SonarQube Configuration
# ============================================
# Dedicated SonarQube config for the Admin module.
# Covers both backend (API routes) and frontend (dashboard + components).

# --- Project Identification ---
sonar.projectKey=medifollow-admin
sonar.projectName=MediFollow Admin Module
sonar.projectVersion=1.0.0

# --- Source Directories ---
# Backend: API routes for admin
# Frontend: Admin dashboard pages + admin components
sonar.sources=app/api/admin,app/dashboard/admin,components/admin,lib

# --- Test Directories ---
sonar.tests=__tests__/backend/admin,__tests__/frontend/components/admin
sonar.test.inclusions=\
  __tests__/backend/admin/**/*.test.js,\
  __tests__/frontend/components/admin/**/*.test.jsx,\
  __tests__/frontend/components/admin/**/*.test.tsx

# --- Exclusions ---
# Ignore generated files, dependencies, configs, and non-admin code
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  coverage/**,\
  public/**,\
  prisma/**,\
  aptos/**,\
  Esprit-FullStackJs-4twin4-2526-MediFollow-feature-coordinateur/**,\
  **/*.config.*,\
  **/*.d.ts,\
  scripts/**,\
  docs/**,\
  k8s/**,\
  monitoring/**,\
  *.md

# --- Language & Encoding ---
sonar.sourceEncoding=UTF-8

# --- Coverage Reports ---
# Backend coverage (lcov from Jest)
sonar.javascript.lcov.reportPaths=coverage/backend/lcov.info,coverage/frontend/lcov.info
sonar.typescript.lcov.reportPaths=coverage/backend/lcov.info,coverage/frontend/lcov.info

# --- Coverage Exclusions ---
sonar.coverage.exclusions=\
  __tests__/**,\
  **/*.test.js,\
  **/*.test.jsx,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/index.ts,\
  app/layout.tsx,\
  app/loading.tsx,\
  app/global-error.tsx

# --- Duplication Exclusions ---
sonar.cpd.exclusions=\
  __tests__/**,\
  **/*.test.js,\
  **/*.test.jsx,\
  **/*.test.ts,\
  **/*.test.tsx
