name: CI - Backend Admin

on:
  push:
    branches:
      - "**"
    paths:
      - "app/api/admin/**"
      - "lib/**"
      - "__tests__/backend/admin/**"
      - "package.json"
      - "package-lock.json"
      - "jest.config.js"
      - ".github/workflows/ci-backend-admin.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "app/api/admin/**"
      - "lib/**"
      - "__tests__/backend/admin/**"
      - "package.json"
      - "package-lock.json"
      - "jest.config.js"
      - ".github/workflows/ci-backend-admin.yml"

jobs:
  test-backend-admin:
    name: Backend Admin Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run admin backend tests
        run: npx jest --coverage --testPathPatterns="__tests__/backend/admin" --coverageReporters=lcov --coverageReporters=text --coverageDirectory=coverage/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Show coverage report
        if: always()
        run: |
          echo "=== Backend Admin Coverage Report ==="
          if [ -f coverage/backend/lcov.info ]; then
            head -100 coverage/backend/lcov.info
            echo "..."
            echo "Full report saved to coverage/backend/lcov.info"
          else
            echo "No coverage file found."
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-admin-coverage
          path: coverage/backend/
          retention-days: 7