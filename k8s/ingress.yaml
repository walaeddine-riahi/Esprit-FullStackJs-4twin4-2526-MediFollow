apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medifollow-ingress
  namespace: medifollow
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rpm: "300"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://medifollow.example.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
  labels:
    app.kubernetes.io/name: medifollow
spec:
  tls:
    - hosts:
        - medifollow.example.com
      secretName: medifollow-tls
  rules:
    - host: medifollow.example.com
      http:
        paths:
          # API routes → backend service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: medifollow-backend
                port:
                  number: 80
          # All other traffic → frontend service
          - path: /
            pathType: Prefix
            backend:
              service:
                name: medifollow-frontend
                port:
                  number: 80
