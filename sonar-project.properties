sonar.projectKey=medifollow
sonar.projectName=MediFollow
sonar.projectVersion=1.0

# Source code
sonar.sources=app,components,lib,models,middleware
sonar.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/node_modules/**,**/.next/**,**/dist/**,**/coverage/**,**/prisma/**

# Test configuration
sonar.tests=__tests__
sonar.test.inclusions=**/__tests__/**/*.test.ts,**/__tests__/**/*.test.tsx

# TypeScript / JavaScript coverage
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=ts
sonar.sourceEncoding=UTF-8

# Links
sonar.links.homepage=https://github.com/YOUR_ORG/medifollow
sonar.links.ci=https://github.com/YOUR_ORG/medifollow/actions
