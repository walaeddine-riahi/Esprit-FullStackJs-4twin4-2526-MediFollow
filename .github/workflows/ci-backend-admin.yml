# ============================================
# MediFollow - CI Pipeline for Admin Backend
# ============================================
# Triggers on push to any branch when backend-related
# files change. Runs Jest tests with coverage for admin tests.

name: CI - Backend Admin

on:
  push:
    branches:
      - "**"
    paths:
      - "app/api/admin/**"
      - "lib/**"
      - "__tests__/backend/admin/**"
      - "package.json"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "app/api/admin/**"
      - "lib/**"
      - "__tests__/backend/admin/**"
      - "package.json"

jobs:
  test-backend-admin:
    name: Backend Admin Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js 18
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Generate Prisma client
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # 5. Run admin backend tests with coverage
      - name: Run admin backend tests
        run: npx jest --coverage --testPathPatterns="__tests__/backend/admin" --coverageReporters=lcov --coverageReporters=text --coverageDirectory=coverage/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # 6. Display coverage summary in the logs
      - name: Show coverage report
        if: always()
        run: |
          echo "=== Backend Admin Coverage Report ==="
          if [ -f coverage/backend/lcov.info ]; then
            cat coverage/backend/lcov.info | head -100
            echo "..."
            echo "Full report saved to coverage/backend/lcov.info"
          else
            echo "No coverage file found."
          fi

      # 7. Upload coverage artifact for later use (SonarQube, etc.)
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-admin-coverage
          path: coverage/backend/
          retention-days: 7
