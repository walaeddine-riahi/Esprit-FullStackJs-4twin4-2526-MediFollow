---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medifollow-frontend
  namespace: medifollow
  labels:
    app: medifollow-frontend
    app.kubernetes.io/name: medifollow-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medifollow-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: medifollow-frontend
    spec:
      containers:
        - name: medifollow-frontend
          image: ghcr.io/YOUR_ORG/medifollow-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: medifollow-config
          env:
            - name: NEXT_PUBLIC_APP_URL
              valueFrom:
                configMapKeyRef:
                  name: medifollow-config
                  key: NEXT_PUBLIC_APP_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
      imagePullSecrets:
        - name: ghcr-credentials

---
# Frontend ClusterIP Service
apiVersion: v1
kind: Service
metadata:
  name: medifollow-frontend
  namespace: medifollow
  labels:
    app: medifollow-frontend
spec:
  type: ClusterIP
  selector:
    app: medifollow-frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
