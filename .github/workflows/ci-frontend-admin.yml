name: CI - Frontend Admin

on:
  push:
    branches:
      - "**"
    paths:
      - "app/dashboard/admin/**"
      - "components/admin/**"
      - "__tests__/frontend/**"
      - "package.json"
      - "package-lock.json"
      - "jest.config.js"
      - ".github/workflows/ci-frontend-admin.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "app/dashboard/admin/**"
      - "components/admin/**"
      - "__tests__/frontend/**"
      - "package.json"
      - "package-lock.json"
      - "jest.config.js"
      - ".github/workflows/ci-frontend-admin.yml"

jobs:
  test-frontend-admin:
    name: Frontend Admin Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run admin frontend tests
        run: npx jest --coverage --testPathPatterns="__tests__/frontend/components/admin" --coverageReporters=lcov --coverageReporters=text --coverageDirectory=coverage/frontend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Show coverage report
        if: always()
        run: |
          echo "=== Frontend Admin Coverage Report ==="
          if [ -f coverage/frontend/lcov.info ]; then
            head -100 coverage/frontend/lcov.info
            echo "..."
            echo "Full report saved to coverage/frontend/lcov.info"
          else
            echo "No coverage file found."
          fi

      - name: Build Next.js project
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-admin-coverage
          path: coverage/frontend/
          retention-days: 7